<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopping & Rewards</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f1f5f9; color: #1e293b; }
        header { background: #6366f1; color: white; padding: 16px 32px; }
        header h1 { font-size: 20px; }
        .tabs { display: flex; gap: 0; background: white; border-bottom: 2px solid #e2e8f0; padding: 0 32px; }
        .tab { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #6366f1; border-bottom-color: #6366f1; font-weight: bold; }
        .page { display: none; max-width: 900px; margin: 24px auto; padding: 0 16px; }
        .page.active { display: block; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .card h2 { font-size: 16px; margin-bottom: 14px; color: #374151; }
        input, select { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 10px; font-size: 14px; }
        button { background: #6366f1; color: white; border: none; padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #4f46e5; }
        .msg { padding: 10px 14px; border-radius: 6px; margin-top: 10px; font-size: 13px; }
        .msg.success { background: #dcfce7; color: #166534; }
        .msg.error { background: #fee2e2; color: #991b1b; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .product-card { background: white; border-radius: 8px; padding: 14px; border: 1px solid #e2e8f0; font-size: 13px; }
        .product-card .name { font-weight: bold; margin-bottom: 4px; }
        .product-card .price { color: #6366f1; font-size: 15px; margin-bottom: 4px; }
        .product-card .stock { color: #94a3b8; font-size: 12px; }
        .product-card .cat { display: inline-block; background: #e0e7ff; color: #4338ca; font-size: 11px; padding: 2px 7px; border-radius: 10px; margin-bottom: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8fafc; padding: 9px 12px; text-align: left; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .badge.points { background: #fef9c3; color: #854d0e; }
        .user-select { display: flex; gap: 10px; margin-bottom: 14px; }
        .user-select select { margin-bottom: 0; }
    </style>
</head>
<body>
<header><h1>🛍 Smart Shopping & Rewards Platform</h1></header>
<div class="tabs">
    <div class="tab active" onclick="showPage('products')">Products</div>
    <div class="tab" onclick="showPage('register')">Register</div>
    <div class="tab" onclick="showPage('purchase')">Purchase</div>
    <div class="tab" onclick="showPage('summary')">My Summary</div>
</div>

<!-- Products -->
<div class="page active" id="page-products">
    <div class="card">
        <h2>All Products (500+ records)</h2>
        <div class="products-grid" id="product-list"></div>
    </div>
</div>

<!-- Register -->
<div class="page" id="page-register">
    <div class="card">
        <h2>Register New Customer</h2>
        <input type="text" id="reg-name" placeholder="Full Name">
        <input type="email" id="reg-email" placeholder="Email Address">
        <button onclick="register()">Register</button>
        <div id="reg-msg"></div>
    </div>
    <div class="card">
        <h2>Existing Customers</h2>
        <table id="users-table">
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Reward Points</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- Purchase -->
<div class="page" id="page-purchase">
    <div class="card">
        <h2>Make a Purchase</h2>
        <label style="font-size:13px;color:#64748b">Select Customer</label>
        <select id="pur-user"></select>
        <label style="font-size:13px;color:#64748b">Select Product</label>
        <select id="pur-product"></select>
        <label style="font-size:13px;color:#64748b">Quantity</label>
        <input type="number" id="pur-qty" value="1" min="1">
        <button onclick="purchase()">Buy Now</button>
        <div id="pur-msg"></div>
    </div>
</div>

<!-- Summary -->
<div class="page" id="page-summary">
    <div class="card">
        <div class="user-select">
            <select id="sum-user" style="flex:1;margin:0"></select>
            <button onclick="loadSummary()">Load Summary</button>
        </div>
        <div id="sum-content"></div>
    </div>
</div>

<script>
let users = [], products = [];

function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.target.classList.add('active');
}

async function loadProducts() {
    const res = await fetch('/api/products');
    products = await res.json();
    const grid = document.getElementById('product-list');
    grid.innerHTML = '';
    products.forEach(p => {
        grid.innerHTML += `<div class="product-card">
            <span class="cat">${p.category}</span>
            <div class="name">${p.name}</div>
            <div class="price">₹${p.price.toLocaleString()}</div>
            <div class="stock">Stock: ${p.stock}</div>
        </div>`;
    });
    const purSel = document.getElementById('pur-product');
    purSel.innerHTML = products.map(p => `<option value="${p.id}">₹${p.price} — ${p.name}</option>`).join('');
}

async function loadUsers() {
    const res = await fetch('/api/users');
    users = await res.json();
    const tbody = document.querySelector('#users-table tbody');
    tbody.innerHTML = users.map(u => `<tr>
        <td>${u.id}</td><td>${u.name}</td><td>${u.email}</td>
        <td><span class="badge points">${u.reward_points} pts</span></td>
    </tr>`).join('');
    ['pur-user','sum-user'].forEach(id => {
        document.getElementById(id).innerHTML = users.map(u =>
            `<option value="${u.id}">${u.name} (${u.reward_points} pts)</option>`).join('');
    });
}

async function register() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const msg = document.getElementById('reg-msg');
    if (!name || !email) { msg.innerHTML = '<div class="msg error">Fill all fields.</div>'; return; }
    const res = await fetch('/api/users', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, email}) });
    const data = await res.json();
    if (res.ok) {
        msg.innerHTML = `<div class="msg success">Registered: ${data.name}!</div>`;
        loadUsers();
    } else {
        msg.innerHTML = `<div class="msg error">${data.error}</div>`;
    }
}

async function purchase() {
    const user_id = document.getElementById('pur-user').value;
    const product_id = document.getElementById('pur-product').value;
    const quantity = document.getElementById('pur-qty').value;
    const msg = document.getElementById('pur-msg');
    const res = await fetch('/api/purchase', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({user_id, product_id, quantity}) });
    const data = await res.json();
    if (res.ok) {
        msg.innerHTML = `<div class="msg success">
            ✅ ${data.message}<br>
            Product: ${data.product} x${data.quantity}<br>
            Original: ₹${data.total_price} | Discount: ${data.discount_applied} | Final: ₹${data.final_price}<br>
            Points earned: ${data.points_earned} | Total points: ${data.total_reward_points}
        </div>`;
        loadUsers(); loadProducts();
    } else {
        msg.innerHTML = `<div class="msg error">${data.error}</div>`;
    }
}

async function loadSummary() {
    const user_id = document.getElementById('sum-user').value;
    const res = await fetch(`/api/summary/${user_id}`);
    const data = await res.json();
    const div = document.getElementById('sum-content');
    const monthly = data.monthly_summary.map(m =>
        `<tr><td>${m.month}</td><td>₹${m.total_spent.toFixed(2)}</td></tr>`).join('');
    const txns = data.transactions.map(t =>
        `<tr><td>${t.product_name}</td><td>${t.quantity}</td><td>₹${t.final_price}</td><td>${t.discount}%</td><td>${t.date}</td></tr>`).join('');
    div.innerHTML = `
        <p style="margin-bottom:10px"><b>${data.user.name}</b> — <span class="badge points">${data.user.reward_points} reward points</span></p>
        <p style="font-size:13px;color:#64748b;margin-bottom:8px">Monthly Spending</p>
        <table style="margin-bottom:16px"><thead><tr><th>Month</th><th>Total Spent</th></tr></thead><tbody>${monthly}</tbody></table>
        <p style="font-size:13px;color:#64748b;margin-bottom:8px">All Transactions</p>
        <table><thead><tr><th>Product</th><th>Qty</th><th>Final Price</th><th>Discount</th><th>Date</th></tr></thead><tbody>${txns}</tbody></table>`;
}

loadProducts(); loadUsers();
</script>
</body>
</html>
